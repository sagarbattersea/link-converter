<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Converter Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; padding: 40px 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #e1e8ed; padding-bottom: 10px; }
        label { font-weight: 600; display: block; margin: 20px 0 8px; color: #546e7a; }
        textarea { width: 100%; padding: 12px; border: 2px solid #cfd8dc; border-radius: 8px; font-family: 'Courier New', Courier, monospace; font-size: 14px; box-sizing: border-box; }
        .btn { background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn:hover { background-color: #2980b9; }
        .btn-copy { background-color: #546e7a; font-size: 12px; float: right; margin-top: -38px; margin-right: 10px; }
        .btn-copy:hover { background-color: #455a64; }
    </style>
</head>
<body>

<div class="container">
    <h2>Link Converter</h2>
    <label>Paste URLs (one per line):</label>
    <textarea id="urlInput" rows="4" oninput="convert()"></textarea>

    <label>HTML:</label>
    <button class="btn btn-copy" onclick="copyText('htmlOutput')">Copy</button>
    <textarea id="htmlOutput" rows="3" readonly></textarea>

    <label>BBCode:</label>
    <button class="btn btn-copy" onclick="copyText('bbOutput')">Copy</button>
    <textarea id="bbOutput" rows="3" readonly></textarea>

    <label>Markdown:</label>
    <button class="btn btn-copy" onclick="copyText('mdOutput')">Copy</button>
    <textarea id="mdOutput" rows="3" readonly></textarea>
    
    <button class="btn" onclick="clearAll()">Clear All</button>
</div>

<script>
    function convert() {
        const input = document.getElementById('urlInput').value;
        const lines = input.split(/\n/).filter(line => line.trim() !== "");
        
        let html = "", bb = "", md = "";

        lines.forEach(line => {
            const url = line.trim();
            const broken = url.replace("://", "://\u200B");
            
            html += `<a href="${url}">${broken}</a><br>\n`;
            bb += `[url=${url}]${broken}[/url]\n`;
            md += `[${broken}](${url})\n`;
        });

        document.getElementById('htmlOutput').value = html.trim();
        document.getElementById('bbOutput').value = bb.trim();
        document.getElementById('mdOutput').value = md.trim();
    }

    function copyText(id) {
        const el = document.getElementById(id);
        el.select();
        document.execCommand("copy");
    }

    function clearAll() {
        ['urlInput', 'htmlOutput', 'bbOutput', 'mdOutput'].forEach(id => document.getElementById(id).value = "");
    }
</script>
</body>
</html>
